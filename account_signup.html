<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sign Up</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
        }

        .container {
            padding: 40px;
            max-width: 500px;
            margin: auto;
            background: white;
            margin-top: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
        }
    </style>
</head>

<body>
    <header><h1>Create Account</h1></header>

    <div class="container">
        <form>
            <label>First Name</label>
            <input type="text">

            <label>Last Name</label>
            <input type="text">

            <label>Email</label>
            <input type="email">

            <label>Password</label>
            <input type="password">

            <label>Account Type</label>
            <select>
                <option>Buyer</option>
                <option>Seller</option>
            </select>

            <button>Create Account</button>
        </form>
    </div>
</body>
</html>
