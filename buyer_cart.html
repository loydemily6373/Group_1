<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Shopping Cart</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
        }

        nav {
            background: #34495e;
            padding: 10px 30px;
        }

            nav a {
                color: white;
                text-decoration: none;
                margin-right: 20px;
                font-weight: bold;
            }

                nav a:hover {
                    text-decoration: underline;
                }

        .container {
            padding: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #3498db;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .checkout-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-top: 20px;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <header><h1>Your Shopping Cart</h1></header>

    <nav>
        <a href="buyer_home.html">Home</a>
        <a href="buyer_cart.html">Cart</a>
        <a href="order_history.html">Orders</a>
        <a href="Index.html">Logout</a>
    </nav>

    <div class="container">
        <table>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
            </tr>
            <tr>
                <td>V-neck T-shirt</td>
                <td>$25</td>
                <td>1</td>
                <td>$25</td>
            </tr>
        </table>

        <h3>Grand Total: $25</h3>
        <button class="checkout-btn">Proceed to Checkout</button>
    </div>
</body>

</html>
