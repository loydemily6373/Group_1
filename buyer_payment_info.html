<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Payment & Shipping Info</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
        }

        .container {
            padding: 40px;
            max-width: 600px;
            margin: auto;
            background: white;
            margin-top: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
        }

        h3 {
            margin-top: 30px;
        }

        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
        }
    </style>
</head>

<body>
    <header><h1>Payment & Shipping Information</h1></header>

    <div class="container">

        <h3>Shipping Address</h3>
        <input type="text" placeholder="Street Address">
        <input type="text" placeholder="City">
        <input type="text" placeholder="State">
        <input type="text" placeholder="Zip Code">

        <h3>Billing Information</h3>
        <input type="text" placeholder="Cardholder Name">
        <input type="text" placeholder="Card Number">
        <input type="text" placeholder="Expiration Date">
        <input type="text" placeholder="CVV">

        <button>Save Information</button>

    </div>
</body>
</html>
